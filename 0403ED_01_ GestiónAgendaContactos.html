<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstra
p.min.css" rel="stylesheet"
>    <title>Agenda de contacto</title>
</head>

<body class="bg-dark">
    <div class="container mt-5">
        <h1 class="text-center mb-4" style="color: white;">📒 Agenda de Contactos</h1>
        <!-- Formulario para agregar contactos -->
        <div class="card mb-4 shadow">
            <div class="card-body">
                <h5 class="card-title">Contacto</h5>
                <div class="row g-3">
                    <div class="col-12 col-md-6 col-lg-4">
                        <input type="text" id="nombre" class="form-control" placeholder="Nombre">
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <input type="email" id="email" class="form-control" placeholder="Email">
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <input type="text" id="empresa" class="form-control" placeholder="Empresa">
                    </div>
                </div>
                <div class="mt-3 d-flex gap-2 flex-wrap">
                    <button class="btn btn-primary" onclick="agregarContacto()">Añadir (push)</button>
                    <button class="btn btn-success" onclick="agregarUrgente()">Añadir Urgente (unshift)</button>
                    <button class="btn btn-warning" onclick="mostrarContactos()">Deshacer úlitmo (pop)</button>
                    <button class="btn btn-secondary" onclick="eliminarContactos()">Atender primero (shift)</button>
                </div>
            </div>
        </div>
        <!-- Tabla o Lista de contactos -->
        <div class="card shadow">
            <div class="card-body">
                <h5 class="card-title">Listados</h5>

                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Telefono</th>
                            <th>Email</th>
                            <th>Empresa</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaContactos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="./js/0403ED_01.js"></script>
</body>

</html>
